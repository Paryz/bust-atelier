<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bust Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --white: #faf8f4;
  --charcoal: #1c1a18;
  --graphite: #3a3835;
  --mid: #6b6560;
  --muted: #a09890;
  --border: #ddd8ce;
  --copper: #b5763a;
  --copper-light: #d4914a;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'Tenor Sans', sans-serif;
}

html, body {
  background: var(--cream);
  color: var(--charcoal);
  font-family: var(--font-serif);
  min-height: 100vh;
}

.wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.site-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.logo-mark {
  width: 36px;
  height: 36px;
  background: var(--charcoal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--copper-light);
  font-size: 1rem;
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--charcoal);
  line-height: 1.3;
}

.logo-sub {
  font-family: var(--font-serif);
  font-size: 0.8rem;
  color: var(--muted);
  font-style: italic;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 300;
}

.progress-dots { display: flex; gap: 6px; align-items: center; }

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.dot.done { background: var(--charcoal); }
.dot.active { background: var(--copper); }

/* START */
.eyebrow {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 0.6rem;
}

.start-title {
  font-size: 2.4rem;
  font-weight: 300;
  line-height: 1.2;
  margin-bottom: 0.9rem;
}

.start-title em { font-style: italic; color: var(--copper); }

.start-body {
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--mid);
  margin-bottom: 1.8rem;
}

.feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
  margin-bottom: 2rem;
}

.feature-item {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 0.6rem 0.9rem;
  font-size: 0.88rem;
  color: var(--graphite);
  border-radius: 2px;
}

/* QUESTION */
.q-label {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 0.5rem;
}

.q-text {
  font-size: 1.65rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 0.4rem;
}

.q-hint {
  font-size: 0.93rem;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 1.4rem;
  line-height: 1.5;
}

.choices { display: grid; gap: 0.5rem; margin-bottom: 1.4rem; }
.choices.two-col { grid-template-columns: 1fr 1fr; }
.choices.one-col { grid-template-columns: 1fr; }

.choice-btn {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 0.75rem 0.9rem;
  text-align: left;
  cursor: pointer;
  border-radius: 2px;
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  font-family: var(--font-serif);
  width: 100%;
}

.choice-btn:hover {
  border-color: var(--copper);
  background: #fff;
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(181,118,58,0.12);
}

.c-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; line-height: 1; }

.c-strong {
  display: block;
  font-size: 0.93rem;
  font-weight: 500;
  color: var(--charcoal);
  font-family: var(--font-serif);
}

.c-desc {
  display: block;
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
  line-height: 1.3;
  font-family: var(--font-serif);
}

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.btn-primary {
  background: var(--charcoal);
  color: var(--cream);
  border: none;
  padding: 0.8rem 2rem;
  font-family: var(--font-sans);
  font-size: 0.73rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, transform 0.15s;
}

.btn-primary:hover { background: var(--copper); transform: translateY(-1px); }

.btn-ghost {
  background: none;
  border: none;
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s;
}

.btn-ghost:hover { color: var(--charcoal); }

.step-count {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--muted);
}

/* THINKING */
.thinking { padding: 2rem 0; }

.thinking-bars {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 220px;
  margin-bottom: 1rem;
}

.tbar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.tbar::after {
  content: '';
  position: absolute;
  left: -40%; top: 0; bottom: 0;
  width: 40%;
  background: linear-gradient(90deg, transparent, var(--copper), transparent);
  animation: scan 1.6s ease-in-out infinite;
}
.tbar:nth-child(2)::after { animation-delay: 0.25s; }
.tbar:nth-child(3)::after { animation-delay: 0.5s; }

@keyframes scan { from { left: -40%; } to { left: 140%; } }

.thinking-text { font-style: italic; color: var(--muted); font-size: 1rem; }

.error-box {
  background: rgba(140,58,46,0.06);
  border-left: 3px solid #8c3a2e;
  padding: 0.65rem 1rem;
  font-size: 0.9rem;
  color: #8c3a2e;
  margin-top: 1rem;
  border-radius: 2px;
}

/* Paste response section */
.paste-section { margin-top: 1.5rem; }

.paste-label {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 0.6rem;
}

.paste-area {
  width: 100%;
  min-height: 140px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 0.9rem 1rem;
  font-family: var(--font-serif);
  font-size: 0.93rem;
  line-height: 1.6;
  color: var(--graphite);
  resize: vertical;
  transition: border-color 0.2s;
  display: block;
}

.paste-area:focus { outline: none; border-color: var(--copper); }
.paste-area::placeholder { color: var(--muted); font-style: italic; }

.paste-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.6rem;
}

.paste-hint {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.choice-btn.choice-active {
  border-color: var(--copper);
  background: #fff8f2;
  box-shadow: 0 0 0 1px var(--copper);
}

.choice-check {
  margin-left: auto;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--copper);
  background: var(--white);
  transition: border-color 0.15s, background 0.15s;
}

.choice-btn.choice-active .choice-check {
  background: var(--copper);
  border-color: var(--copper);
  color: white;
}

.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.start-divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1.8rem 0 0;
  color: var(--muted);
}

.start-divider::before,
.start-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.start-divider span {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Result */
.result-hero {
  background: var(--charcoal);
  color: var(--cream);
  padding: 1.8rem;
  border-radius: 2px;
  margin-bottom: 1rem;
}
.result-eyebrow { font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--copper-light); margin-bottom: 0.4rem; }
.result-title { font-size: 1.65rem; font-weight: 300; line-height: 1.2; margin-bottom: 0.3rem; }
.result-theme { font-size: 0.9rem; color: rgba(245,240,232,0.5); font-style: italic; }

.rblock { background: var(--white); border: 1px solid var(--border); border-radius: 2px; padding: 1.2rem 1.4rem; margin-bottom: 0.8rem; }
.rblock-title { font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--copper); margin-bottom: 0.8rem; padding-bottom: 0.55rem; border-bottom: 1px solid var(--border); }
.rblock-text { font-size: 0.95rem; line-height: 1.65; color: var(--graphite); }

.palette-row { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-bottom: 0.65rem; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
.swatch-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.2s; }
.swatch:hover .swatch-dot { transform: scale(1.15) translateY(-2px); }
.swatch-role { font-family: var(--font-sans); font-size: 0.54rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
.swatch-name { font-size: 0.7rem; color: var(--mid); text-align: center; max-width: 54px; font-style: italic; line-height: 1.2; }
.palette-note { font-size: 0.86rem; font-style: italic; color: var(--muted); }

.step-list { display: flex; flex-direction: column; }
.step-row { display: flex; gap: 0.85rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); }
.step-row:last-child { border-bottom: none; }
.step-n { font-family: var(--font-sans); font-size: 0.58rem; color: var(--copper); width: 16px; flex-shrink: 0; padding-top: 3px; }
.step-body { font-size: 0.92rem; line-height: 1.55; color: var(--graphite); }

.criteria-list { display: flex; flex-direction: column; gap: 0.65rem; }
.criterion { display: grid; grid-template-columns: 130px 1fr; gap: 0.75rem; align-items: center; }
.crit-name { font-family: var(--font-sans); font-size: 0.63rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); }
.crit-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.crit-bar { height: 100%; background: var(--copper); border-radius: 2px; width: 0%; transition: width 1s cubic-bezier(0.22,1,0.36,1); }
.pro-tip { border-left: 3px solid var(--copper); padding-left: 1rem; font-size: 0.93rem; line-height: 1.6; color: var(--graphite); }

.ai-badge {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.78rem;
  color: var(--muted);
  font-style: italic;
}

/* Limited palette block */
.lp-block {
  background: var(--charcoal);
  border-radius: 2px;
  padding: 1.4rem 1.5rem;
  margin-bottom: 0.8rem;
}

.lp-title {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--copper-light);
  margin-bottom: 0.3rem;
}

.lp-subtitle {
  font-size: 0.88rem;
  color: rgba(245,240,232,0.5);
  font-style: italic;
  margin-bottom: 1.2rem;
}

.lp-paints {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  margin-bottom: 1.2rem;
}

.lp-paint {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}

.lp-swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.12);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.lp-paint-info { flex: 1; }

.lp-paint-name {
  font-size: 0.95rem;
  color: var(--cream);
  font-weight: 400;
  display: block;
}

.lp-paint-role {
  font-size: 0.8rem;
  color: var(--copper-light);
  font-style: italic;
  display: block;
}

.lp-mixes {
  border-top: 1px solid rgba(245,240,232,0.08);
  padding-top: 1rem;
}

.lp-mixes-label {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.35);
  margin-bottom: 0.7rem;
}

.lp-mix-row {
  display: flex;
  align-items: flex-start;
  gap: 0.7rem;
  margin-bottom: 0.55rem;
}

.lp-mix-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
  background: var(--copper);
}

.lp-mix-text {
  font-size: 0.88rem;
  color: rgba(245,240,232,0.65);
  line-height: 1.45;
}

.ai-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--copper);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

.fade-up { animation: fadeUp 0.38s ease forwards; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 400px) {
  .choices.two-col { grid-template-columns: 1fr; }
  .feature-grid { grid-template-columns: 1fr; }
  .criterion { grid-template-columns: 100px 1fr; }
}

/* Prompt export box */
.prompt-export-box {
  background: var(--charcoal);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 0.5rem;
}

.prompt-export-text {
  padding: 1.2rem 1.3rem;
  font-family: monospace;
  font-size: 0.8rem;
  line-height: 1.65;
  color: rgba(245,240,232,0.82);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 320px;
  overflow-y: auto;
}

.prompt-export-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1.1rem;
  background: rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,255,255,0.07);
}

.prompt-export-hint {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: rgba(245,240,232,0.3);
  text-transform: uppercase;
}

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--mid);
  padding: 0.45rem 1rem;
  font-family: var(--font-sans);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}

.copy-btn:hover { border-color: var(--charcoal); color: var(--charcoal); }
.copy-btn.copied { border-color: #4a7c59; color: #4a7c59; }
.color-picker-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 0.75rem 1rem;
  margin-bottom: 1.4rem;
}

.color-picker-label {
  font-size: 0.88rem;
  color: var(--mid);
  font-style: italic;
  flex: 1;
  line-height: 1.4;
}

.color-picker-label strong {
  display: block;
  font-style: normal;
  font-size: 0.9rem;
  color: var(--charcoal);
  font-weight: 500;
  margin-bottom: 0.15rem;
}

.color-preview {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.1);
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}

.color-preview:hover { transform: scale(1.1); }

.color-preview input[type="color"] {
  position: absolute;
  inset: -4px;
  width: calc(100% + 8px);
  height: calc(100% + 8px);
  opacity: 0;
  cursor: pointer;
  border: none;
  padding: 0;
}

.color-hex {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  min-width: 52px;
  text-align: right;
}
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="site-logo">
      <div class="logo-mark">&#10022;</div>
      <div>
        <div class="logo-text">Bust Atelier</div>
        <div class="logo-sub">Competition Advisor</div>
      </div>
    </div>
    <div class="progress-dots" id="dots"></div>
  </header>
  <div id="screen"></div>
</div>

<script>
var STEPS = [
  {
    id: 'subject', name: 'Subject', label: 'The bust before you',
    text: 'What is the subject of your bust?',
    hint: 'The subject defines the dominant skin tone, material storytelling, and emotional language.',
    layout: 'two-col',
    choices: [
      { icon: 'A', value: 'human_warrior', label: 'Human Warrior / Knight', desc: 'Flesh, battle-wear, metal and leather' },
      { icon: 'B', value: 'human_mage', label: 'Mage / Scholar', desc: 'Delicate skin, fabric, arcane focus' },
      { icon: 'C', value: 'elf_fey', label: 'Elf / Fey Being', desc: 'Ethereal skin, pointed features' },
      { icon: 'D', value: 'monster_creature', label: 'Monster / Creature', desc: 'Non-human skin tones, scales, fur' },
      { icon: 'E', value: 'undead_demon', label: 'Undead / Daemon', desc: 'Desaturated or hellish flesh' },
      { icon: 'F', value: 'historical', label: 'Historical / Portrait', desc: 'Realistic anatomy, period accuracy' }
    ]
  },
  {
    id: 'skin_tone', name: 'Skin Tone', label: 'The complexion',
    text: 'What skin tone family are you working with?',
    hint: 'Skin is always the focal point of a bust. Your tonal family shapes everything else.',
    layout: 'two-col',
    choices: [
      { icon: 'A', value: 'very_fair', label: 'Very Fair / Pale', desc: 'Porcelain, northern European, undead tint' },
      { icon: 'B', value: 'fair_warm', label: 'Fair and Warm', desc: 'Peach, light Mediterranean' },
      { icon: 'C', value: 'olive_medium', label: 'Olive / Medium', desc: 'Warm mid-tones, subtle green' },
      { icon: 'D', value: 'brown_deep', label: 'Brown / Deep', desc: 'Rich siennas, mahogany, deep warmth' },
      { icon: 'E', value: 'very_dark', label: 'Very Dark / Ebony', desc: 'Deep brown, rich contrast work' },
      { icon: 'F', value: 'non_human', label: 'Non-Human', desc: 'Green, grey, blue, purple skin' }
    ]
  },
  {
    id: 'lighting', name: 'Lighting', label: 'The light source',
    text: 'What lighting concept do you want to build?',
    hint: 'Lighting is the single biggest factor in competition judging. Choose with intention.',
    layout: 'two-col',
    choices: [
      { icon: 'A', value: 'natural_top', label: 'Natural Top Light', desc: 'Soft daylight from above, classical' },
      { icon: 'B', value: 'warm_candle', label: 'Warm Candle / Fire', desc: 'OSL from below, orange and amber glow' },
      { icon: 'C', value: 'cold_magic', label: 'Cold Arcane / Magic', desc: 'OSL with blue or teal glow' },
      { icon: 'D', value: 'dramatic_rim', label: 'Dramatic Rim Light', desc: 'Strong side or back-lit, deep contrast' },
      { icon: 'E', value: 'battlefield', label: 'Battlefield / Overcast', desc: 'Diffuse grey light, muted tones' },
      { icon: 'F', value: 'moonlight', label: 'Moonlight / Night', desc: 'Cold desaturated light, deep shadows' }
    ]
  },
  {
    id: 'metals', name: 'Metals', label: 'The metalwork',
    text: 'How will you handle metal elements?',
    hint: 'Select all that apply. NMM types can be combined on the same piece.',
    layout: 'one-col',
    multi: true,
    choices: [

var TOTAL = STEPS.length;
var state = { screen: 'start', step: 0, answers: {}, labels: {}, result: null, error: null, skinBaseColor: '#c8845a', generatedPrompt: '', pastedResponse: '' };

function render() {
  updateDots();
  var el = document.getElementById('screen');
  el.className = '';
  void el.offsetWidth;
  el.className = 'fade-up';

  if (state.screen === 'start') el.innerHTML = htmlStart();
  else if (state.screen === 'questions') el.innerHTML = htmlQuestion();
  else if (state.screen === 'prompt') el.innerHTML = htmlPrompt();
  else if (state.screen === 'result') el.innerHTML = htmlResult();

  bind();
  setTimeout(function() {
    var bars = document.querySelectorAll('.crit-bar[data-w]');
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.width = bars[i].getAttribute('data-w') + '%';
    }
  }, 80);
}

function updateDots() {
  var el = document.getElementById('dots');
  if (state.screen === 'start') { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < TOTAL; i++) {
    var cls = '';
    if (i < state.step || state.screen === 'prompt' || state.screen === 'result') cls = 'done';
    else if (i === state.step && state.screen === 'questions') cls = 'active';
    html += '<div class="dot ' + cls + '"></div>';
  }
  el.innerHTML = html;
}

function parseResponse() {
  var pasted = (state.pastedResponse || '').trim();
  var returnScreen = state.screen; // remember where we came from

  pasted = pasted.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

  var start = pasted.indexOf('{');
  var end = pasted.lastIndexOf('}');
  if (start === -1 || end === -1) {
    state.error = 'No JSON found. Make sure you copied the full AI response including the { and } braces.';
    render();
    return;
  }

  var json = pasted.slice(start, end + 1)
    .replace(/\u2018|\u2019/g, "'")
    .replace(/\u201c|\u201d/g, '"')
    .replace(/\u2014|\u2013/g, '-');

  try {
    var parsed = JSON.parse(json);
    if (Array.isArray(parsed.criteria)) {
      for (var i = 0; i < parsed.criteria.length; i++) {
        parsed.criteria[i].score = Number(parsed.criteria[i].score) || 70;
      }
    }
    state.result = parsed;
    state.error = null;
    state.screen = 'result';
    render();
  } catch (err) {
    state.error = 'Could not parse the JSON. The AI may have added extra text around it — try selecting just the { ... } block and pasting that.';
    render();
  }
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function buildPrompt() {
  var a = state.answers;
  var l = state.labels;
  var schema = '{\n' +
    '  "title": "5-7 word evocative name for this scheme",\n' +
    '  "theme": "One sentence artistic vision",\n' +
    '  "palette": [\n' +
    '    { "name": "paint name", "hex": "#rrggbb", "role": "shadow|base|mid|highlight|accent|osl" }\n' +
    '  ],\n' +
    '  "paletteNote": "One sentence on warm-cool temperature shifts across the range",\n' +
    '  "lighting": "2-3 sentences on technical lighting execution",\n' +
    '  "narrative": "2 sentences on emotional storytelling through colour",\n' +
    '  "criteria": [\n' +
    '    { "area": "Skin and Flesh", "score": 0-100 },\n' +
    '    { "area": "Contrast and Volume", "score": 0-100 },\n' +
    '    { "area": "Colour Harmony", "score": 0-100 },\n' +
    '    { "area": "NMM or TMM", "score": 0-100 },\n' +
    '    { "area": "Narrative", "score": 0-100 },\n' +
    '    { "area": "Technical Finish", "score": 0-100 }\n' +
    '  ],\n' +
    '  "steps": [\n' +
    '    "Step 1 description", "Step 2 description"\n' +
    '  ],\n' +
    '  "proTip": "One advanced tip a judge would notice",\n' +
    '  "limitedPalette": {\n' +
    '    "intro": "One sentence learning goal",\n' +
    '    "paints": [\n' +
    '      { "name": "paint name", "hex": "#rrggbb", "role": "what it does" }\n' +
    '    ],\n' +
    '    "mixes": [\n' +
    '      "2 parts X + 1 part Y = result description"\n' +
    '    ]\n' +
    '  }\n' +
    '}';

  var metals = state.answers.metals || [];
  var nmmCount = Array.isArray(metals) ? metals.filter(function(v) { return v.indexOf('nmm') === 0; }).length : 0;
  var lpPaintCount = nmmCount >= 2 ? '7' : '5';

  var brands = state.answers.brands || [];
  var brandLabels = Array.isArray(brands) && brands.length > 0
    ? (state.labels.brands || brands.join(', '))
    : 'any widely available brand';
  var brandsInstruction = Array.isArray(brands) && brands.length > 0
    ? 'Name paints using exact product names from these brands only: ' + brandLabels + '. If a colour is not available in those ranges, choose the closest equivalent that is.'
    : 'Use widely available paint names.';

  return 'You are a master competition miniature bust painter with extensive experience at Golden Demon, Crystal Brush, and Salon du Modelisme.\n\n' +
    'Give me a full competition painting strategy for my bust:\n' +
    '- Subject: ' + (l.subject || a.subject) + '\n' +
    '- Skin tone family: ' + (l.skin_tone || a.skin_tone) + '\n' +
    '- Primary skin base colour (hex): ' + state.skinBaseColor + '\n' +
    '- Lighting concept: ' + (l.lighting || a.lighting) + '\n' +
    '- Metal treatment: ' + (state.labels.metals || (Array.isArray(metals) ? metals.join(', ') : metals)) + '\n' +
    '- Target competition level: ' + (l.competition || a.competition) + '\n' +
    '- Emotional narrative: ' + (l.narrative || a.narrative) + '\n' +
    '- Paint brands available: ' + brandLabels + '\n\n' +
    'IMPORTANT: Reply with ONLY a single raw JSON object. No explanation, no markdown, no text before or after. ' +
    'Start your response with { and end with }. Use only straight quotes. ' +
    'The palette should have 6-8 entries anchored to the base colour ' + state.skinBaseColor + ' with shadows darker and highlights lighter. ' +
    brandsInstruction + ' ' +
    'Criteria scores (0-100) represent how much to prioritise each area for this specific bust. ' +
    'Steps should be 7-9 entries. ' +
    'Limited palette should use exactly ' + lpPaintCount + ' paints' + (lpPaintCount === '7' ? ' — the extra paints should cover the additional NMM metal types selected (' + metals.filter(function(v) { return v.indexOf('nmm') === 0; }).join(', ') + ')' : '') + '. ' +
    brandsInstruction + '\n\n' +
    'Use exactly this JSON structure:\n' + schema;
}

function bind() {
  var copyBtn = document.getElementById('copy-btn');
  if (copyBtn) {
    copyBtn.onclick = function() {
      var txt = state.generatedPrompt || '';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(function() {
          copyBtn.textContent = 'Copied!';
          copyBtn.className = 'copy-btn copied';
          setTimeout(function() { copyBtn.textContent = 'Copy prompt'; copyBtn.className = 'copy-btn'; }, 2200);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.textContent = 'Copied!';
        copyBtn.className = 'copy-btn copied';
        setTimeout(function() { copyBtn.textContent = 'Copy prompt'; copyBtn.className = 'copy-btn'; }, 2200);
      }
    };
  }

  var startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.onclick = function() {
    state.screen = 'questions'; state.step = 0; state.answers = {}; state.labels = {};
    render();
  };

  var backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.onclick = function() {
    if (state.screen === 'prompt') {
      state.screen = 'questions';
      state.step = TOTAL - 1;
    } else if (state.screen === 'result') {
      state.screen = 'prompt';
    } else if (state.step > 0) {
      var prev = STEPS[state.step - 1];
      if (prev) { delete state.answers[prev.id]; delete state.labels[prev.id]; }
      state.step--;
    }
    state.error = null;
    render();
  };

  var restartBtn = document.getElementById('restart-btn');
  if (restartBtn) restartBtn.onclick = function() {
    state = { screen: 'start', step: 0, answers: {}, labels: {}, result: null, error: null, skinBaseColor: '#c8845a', generatedPrompt: '', pastedResponse: '' };
    render();
  };

  // Paste area — keep response in state as user types
  var pasteArea = document.getElementById('paste-area');
  if (pasteArea) {
    pasteArea.addEventListener('input', function() {
      state.pastedResponse = pasteArea.value;
      var hint = document.getElementById('paste-hint');
      var buildBtn = document.getElementById('build-btn');
      if (hint) hint.textContent = pasteArea.value.length > 0 ? pasteArea.value.length + ' characters' : 'Nothing pasted yet';
      if (buildBtn) buildBtn.disabled = pasteArea.value.length < 10;
    });
  }

  var buildBtn = document.getElementById('build-btn');
  if (buildBtn) buildBtn.onclick = function() {
    if (state.pastedResponse && state.pastedResponse.length >= 10) parseResponse();
  };

  var colorInput = document.getElementById('skin-color-input');
  if (colorInput) {
    colorInput.addEventListener('input', function() {
      state.skinBaseColor = colorInput.value;
      var preview = colorInput.parentElement;
      preview.style.background = colorInput.value;
      var hexDisplay = document.getElementById('color-hex-display');
      if (hexDisplay) hexDisplay.textContent = colorInput.value;
    });
  }

  var useColorBtn = document.getElementById('use-color-btn');
  if (useColorBtn) {
    useColorBtn.onclick = function() {
      // Advance with color as the skin tone answer
      state.answers['skin_tone'] = 'custom_color';
      state.labels['skin_tone'] = 'Custom colour: ' + state.skinBaseColor;
      state.step++;
      state.error = null;
      render();
    };
  }

  var multiConfirmBtn = document.getElementById('multi-confirm-btn');
  if (multiConfirmBtn) {
    multiConfirmBtn.onclick = function() {
      var q = STEPS[state.step];
      var selected = state.answers[q.id] || [];
      if (selected.length === 0) return;
      state.labels[q.id] = selected.map(function(v) {
        var match = q.choices.filter(function(c) { return c.value === v; })[0];
        return match ? match.label : v;
      }).join(', ');
      if (state.step < TOTAL - 1) {
        state.step++;
        state.error = null;
        render();
      } else {
        state.generatedPrompt = buildPrompt();
        state.screen = 'prompt';
        render();
      }
    };
  }

  var btns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.onclick = function() {
        var q = STEPS[state.step];

        if (q.multi) {
          // Toggle selection
          var val = btn.getAttribute('data-value');
          var selected = state.answers[q.id] || [];

          // "No metals" is exclusive — selecting it clears others; selecting others clears it
          if (val === 'no_metals') {
            selected = selected.indexOf('no_metals') !== -1 ? [] : ['no_metals'];
          } else {
            var idx = selected.indexOf(val);
            // Remove 'no_metals' if present
            selected = selected.filter(function(v) { return v !== 'no_metals'; });
            if (idx !== -1) {
              selected.splice(idx, 1);
            } else {
              selected.push(val);
            }
          }
          state.answers[q.id] = selected;

          // Update button appearance immediately without full re-render
          var allBtns = document.querySelectorAll('.choice-btn');
          for (var j = 0; j < allBtns.length; j++) {
            var bVal = allBtns[j].getAttribute('data-value');
            var isNowActive = selected.indexOf(bVal) !== -1;
            allBtns[j].className = 'choice-btn' + (isNowActive ? ' choice-active' : '');
            var check = allBtns[j].querySelector('.choice-check');
            if (check) check.innerHTML = isNowActive ? '&#10003;' : '';
          }
          var confirmBtn = document.getElementById('multi-confirm-btn');
          if (confirmBtn) confirmBtn.disabled = selected.length === 0;

        } else {
          // Single select — advance immediately
          state.answers[q.id] = btn.getAttribute('data-value');
          state.labels[q.id] = btn.getAttribute('data-label');
          if (state.step < TOTAL - 1) {
            state.step++;
            state.error = null;
            render();
          } else {
            state.generatedPrompt = buildPrompt();
            state.screen = 'prompt';
            render();
          }
        }
      };
    })(btns[i]);
  }
}

render();
</script>
</body>
</html>
